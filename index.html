<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Manager Pro</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .fade-in {
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-[#0b0b0f] text-white flex justify-center items-center min-h-screen">

<div class="w-full max-w-xl bg-[#111] p-6 rounded-2xl shadow-lg">

  <h1 class="text-2xl font-bold text-purple-400 mb-2">Task Manager</h1>

  <p id="counter" class="text-gray-400 text-sm mb-4"></p>

  <!-- INPUT -->
  <div class="flex gap-2 mb-4">
    <input id="taskInput" type="text"
      placeholder="Add a task..."
      class="flex-1 px-4 py-2 bg-gray-800 rounded outline-none">

    <button id="addBtn"
      class="bg-purple-500 px-4 rounded hover:bg-purple-600">
      Add
    </button>
  </div>

  <!-- FILTER -->
  <div class="flex gap-3 mb-4 text-sm">
    <button class="filter-btn" data-filter="all">All</button>
    <button class="filter-btn" data-filter="done">Done</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
  </div>

  <!-- LIST -->
  <ul id="taskList" class="space-y-3"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
